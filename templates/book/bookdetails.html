{%extends 'base.html'%}
{%block title %}
Book_List
{%endblock%}
 {%block content%}
<table border="1px solid" width="100%" height="100%">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Price</th>
        <th>Image</th>

    </tr>

        <tr>
            <td>{{book.id}}</td>
            <td>{{book.title}}</td>
            <td>{{book.description}}</td>
            <td>{{book.price}}</td>
            <td>
                <img src="{{book.image}}" width="30%" height="30%" alt="{{book.title}}">
            </td>


        </tr>

</table>




{%endblock%}
